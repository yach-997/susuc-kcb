name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_BASE: ./
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Rewrite HTML assets to jsDelivr
        run: node scripts/rewrite-cdn-html.mjs

      - name: Publish CDN mirror branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: cdn
          force_orphan: true
          commit_message: 'cdn: publish static build'

      # 国内固定域名：每次 push 自动覆盖同一地址，同学不用换链接
      # 需在 GitHub → Settings → Secrets 添加 SHIP_API_KEY
      - name: Deploy ShipStatic (fixed domain)
        id: ship
        continue-on-error: true
        env:
          SHIP_API_KEY: ${{ secrets.SHIP_API_KEY }}
          SHIP_DOMAIN: ${{ vars.SHIP_DOMAIN }}
        run: |
          set -euo pipefail
          if [ -z "${SHIP_API_KEY:-}" ]; then
            echo "未配置 SHIP_API_KEY，跳过国内固定域名部署。" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "在仓库 Settings → Secrets and variables → Actions 添加 SHIP_API_KEY 后，" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "同学只需收藏 https://susuc-kcb.shipstatic.com/ ，以后刷新即可。" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          DOMAIN="${SHIP_DOMAIN:-susuc-kcb}"
          echo "whoami:" 
          npx -y @shipstatic/ship whoami --api-key "$SHIP_API_KEY" --json || true
          echo "validate domain:"
          npx -y @shipstatic/ship domains validate "$DOMAIN" --api-key "$SHIP_API_KEY" --json || true
          DEPLOY_ID=$(npx -y @shipstatic/ship ./dist --api-key "$SHIP_API_KEY" -q)
          echo "deployment=$DEPLOY_ID"
          echo "preview=https://${DEPLOY_ID}.shipstatic.com/"
          # 平台子域名写法：susuc-kcb → susuc-kcb.shipstatic.com
          npx -y @shipstatic/ship domains set "$DOMAIN" "$DEPLOY_ID" --api-key "$SHIP_API_KEY" --json
          echo "### 国内固定地址（同学收藏这一个）" >> "$GITHUB_STEP_SUMMARY"
          echo "https://${DOMAIN}.shipstatic.com/" >> "$GITHUB_STEP_SUMMARY"
          echo "本次部署预览：https://${DEPLOY_ID}.shipstatic.com/" >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
